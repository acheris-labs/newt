name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          sw_vers
          swift --version

      - name: Build (ad-hoc, Release)
        run: make build

      - name: Verify ad-hoc signature
        run: codesign -dv build/Newt.app 2>&1

      - name: Upload Newt.app
        uses: actions/upload-artifact@v4
        with:
          name: Newt.app
          path: build/Newt.app
          if-no-files-found: error
